spring.application.name=expense_tracker_bx

server.port=8080

server.servlet.context-path=/api/v1

# MySQL Connection URL (default port is 3306)
# Added createDatabaseIfNotExist=true as a handy default, remove if you prefer to create it manually
spring.datasource.url=jdbc:mysql://localhost:3306/ExpenseTrackerDB?createDatabaseIfNotExist=true

# Your MySQL credentials
spring.datasource.username=root
spring.datasource.password=Malinga@mysql123

# The JDBC driver for MySQL (updated for modern Connector/J)
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

# Shows the SQL queries Hibernate generates in your console (useful for debugging).
spring.jpa.show-sql=true

# Formats the SQL queries in the console so they are readable.
spring.jpa.properties.hibernate.format_sql=true

# Explicitly sets the MySQL dialect so Hibernate knows how to format queries for MySQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# JWT Configuration
# A 256-bit (or 512-bit) Base64/Hex encoded secret key
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Access token expiration time in milliseconds (86400000 ms = 24 hours)
application.security.jwt.expiration=86400000

# Refresh token expiration time in milliseconds (604800000 ms = 7 days)
application.security.jwt.refresh-token.expiration=604800000